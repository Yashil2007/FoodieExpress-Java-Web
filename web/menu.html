<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; padding-top: 30px; }
        .menu-box { display: none; padding: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fff; }
        .active { display: block; }
        .price { float: right; font-weight: bold; color: green; }
    </style>
    <script>
        function swap(val) {
            document.querySelectorAll('.menu-box').forEach(div => div.classList.remove('active'));
            document.getElementById(val).classList.add('active');
            document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        }
    </script>
</head>
<body>
<div class="container">
    <div class="card mx-auto shadow-sm" style="max-width: 500px; border-radius: 15px;">
        <div class="card-body">
            <h2 class="text-center text-danger mb-4">🍕 FoodieExpress</h2>
            <form action="OrderServlet" method="post">
                <label class="fw-bold">1. Select Restaurant</label>
                <select name="restaurant" class="form-select mb-3" onchange="swap(this.value)">
                    <option value="Dom">Domino's Pizza</option>
                    <option value="BK">Burger King</option>
                    <option value="Sub">Subway Fresh</option>
                </select>

                <label class="fw-bold">2. Select Items</label>
                <div id="Dom" class="menu-box active">
                    <input type="checkbox" name="food" value="Pizza"> Pizza <span class="price">200 Rs</span><br>
                    <input type="checkbox" name="food" value="Garlic Bread"> Garlic Bread <span class="price">150 rs</span><br>
                    <input type="checkbox" name="food" value="Coke"> Coca Cola <span class="price">60 Rs</span>
                </div>
                <div id="BK" class="menu-box">
                    <input type="checkbox" name="food" value="Whopper"> Whopper Burger <span class="price">120 Rs</span><br>
                    <input type="checkbox" name="food" value="Fries"> French Fries <span class="price">90 Rs</span><br>
                    <input type="checkbox" name="food" value="Pepsi"> Pepsi <span class="price">60 Rs</span>
                </div>
                <div id="Sub" class="menu-box">
                    <input type="checkbox" name="food" value="Paneer Sub"> Paneer Sub <span class="price">180 Rs</span><br>
                    <input type="checkbox" name="food" value="Veggie Sub"> Veggie Sub <span class="price">160 Rs</span><br>
                    <input type="checkbox" name="food" value="Sprite"> Sprite <span class="price">60 Rs</span>
                </div>

                <div class="row mt-3">
                    <div class="col-6">
                        <label class="fw-bold">Qty</label>
                        <input type="number" name="quantity" class="form-control" value="1" min="1">
                    </div>
                    <div class="col-6">
                        <label class="fw-bold">Payment</label>
                        <select name="payment" class="form-select">
                            <option>UPI</option>
                            <option>Card</option>
                            <option>Net Banking</option>
                            <option>Cash</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger w-100 mt-4 py-2 fw-bold">Order Now</button>
            </form>
            <div class="text-center mt-3"><a href="vieworders.jsp" class="small text-decoration-none">Order History</a></div>
        </div>
    </div>
</div>
</body>
</html>
